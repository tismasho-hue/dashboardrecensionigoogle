<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useMemo } = React;

    // Icons as simple SVG components
    const Icon = ({ name, size = 24, fill = "none", stroke = "currentColor" }) => {
      const icons = {
        upload: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />,
        star: <polygon fill={fill} points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />,
        trendingUp: <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><polyline points="17 6 23 6 23 12" /></>,
        trendingDown: <><polyline points="23 18 13.5 8.5 8.5 13.5 1 6" /><polyline points="17 18 23 18 23 12" /></>,
        users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></>,
        store: <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></>,
        award: <><circle cx="12" cy="8" r="7" /><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88" /></>,
        alertCircle: <><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></>,
        x: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
        chevronDown: <polyline points="6 9 12 15 18 9" />,
        chevronUp: <polyline points="18 15 12 9 6 15" />,
        chevronLeft: <polyline points="15 18 9 12 15 6" />,
        chevronRight: <polyline points="9 18 15 12 9 6" />,
        calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></>
      };
      
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {icons[name]}
        </svg>
      );
    };

    const STORES = [
      { id: 'istria', name: 'Piazza Istria', color: '#FF6B35' },
      { id: 'trastevere', name: 'Trastevere', color: '#4ECDC4' },
      { id: 'ponte', name: 'Ponte Milvio', color: '#95E1D3' },
      { id: 'tuscolana', name: 'Tuscolana', color: '#F38181' }
    ];

    // Google Takeout location ID mapping
    const LOCATION_ID_MAP = {
      '2622842657199981833': 'trastevere',
      '7316952155162150680': 'tuscolana',
      '7773309171614314525': 'istria',
      '16703766235422777690': 'ponte'
    };

    function detectStoreFromLocationId(text) {
      for (const [locationId, storeId] of Object.entries(LOCATION_ID_MAP)) {
        if (text.includes(locationId)) {
          return storeId;
        }
      }
      return null;
    }

    const CASHIERS = [
      'Marco', 'Giulia', 'Alessandro', 'Francesca', 'Luca', 
      'Sofia', 'Matteo', 'Chiara', 'Andrea', 'Valentina',
      'Giovanni', 'Martina', 'Federico', 'Elena', 'Simone'
    ];

    const MONTHS_IT = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno', 'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];

    // Premi a rotazione per il 1° classificato
    const PRIZES = [
      { id: 1, name: 'Weekend libero pagato', emoji: '🏖️' },
      { id: 2, name: 'Buono Amazon 100€', emoji: '🎁' },
      { id: 3, name: '100€ cash', emoji: '💰' },
      { id: 4, name: 'Cena per 2 persone', emoji: '🍽️' },
      { id: 5, name: 'Giorno libero extra', emoji: '🌴' }
    ];

    function getPrizeForMonth(monthKey) {
      if (!monthKey) return null;
      const [year, month] = monthKey.split('-');
      const monthIndex = parseInt(month) - 1; // 0-11
      const prizeIndex = monthIndex % PRIZES.length;
      return PRIZES[prizeIndex];
    }

    function parseReviewDate(dateStr) {
      if (!dateStr) return null;
      
      let match = dateStr.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
      if (match) {
        return new Date(parseInt(match[3]), parseInt(match[2]) - 1, parseInt(match[1]));
      }
      
      match = dateStr.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
      if (match) {
        return new Date(parseInt(match[1]), parseInt(match[2]) - 1, parseInt(match[3]));
      }
      
      const parsed = new Date(dateStr);
      if (!isNaN(parsed.getTime())) {
        return parsed;
      }
      
      return null;
    }

    function getMonthKey(date) {
      if (!date) return null;
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    }

    function formatMonthLabel(monthKey) {
      if (!monthKey) return 'Tutti';
      const [year, month] = monthKey.split('-');
      return `${MONTHS_IT[parseInt(month) - 1]} ${year}`;
    }

    function analyzeSentiment(text, rating) {
      // Sentiment based on star rating: 1-3 = negative, 4-5 = positive
      if (rating >= 4) return 'positive';
      if (rating >= 1 && rating <= 3) return 'negative';
      return 'neutral';
    }

    function parseGoogleTakeoutJSON(jsonData, fileName = '') {
      const reviews = [];
      let reviewsArray = [];
      let detectedStore = null;
      
      // Try to detect store from filename
      detectedStore = detectStoreFromLocationId(fileName);
      
      if (Array.isArray(jsonData)) {
        reviewsArray = jsonData;
      } else if (jsonData.reviews) {
        reviewsArray = jsonData.reviews;
      } else if (jsonData.locations) {
        jsonData.locations.forEach(location => {
          if (location.reviews) {
            location.reviews.forEach(r => {
              reviewsArray.push({ ...r, locationName: location.name || location.locationName });
            });
          }
        });
      }
      
      reviewsArray.forEach(review => {
        let rating = 0;
        if (review.starRating) {
          const ratingMap = { 'ONE': 1, 'TWO': 2, 'THREE': 3, 'FOUR': 4, 'FIVE': 5 };
          rating = ratingMap[review.starRating] || 0;
        } else if (review.rating) {
          rating = parseFloat(review.rating) || 0;
        } else if (review.star_rating) {
          rating = parseFloat(review.star_rating) || 0;
        }
        
        const text = review.comment || review.text || review.reviewText || review.review || '';
        const date = review.createTime || review.updateTime || review.date || review.reviewDate || '';
        const reviewer = review.reviewer?.displayName || review.reviewerName || review.author || review.name || 'Anonimo';
        
        // Try to detect store from review name field (contains location ID)
        let store = detectedStore || review.locationName || review.location || review.store || '';
        if (!store && review.name) {
          store = detectStoreFromLocationId(review.name) || '';
        }
        
        const reply = review.reviewReply?.comment || review.ownerResponse || review.reply || '';
        
        reviews.push({
          rating,
          text,
          date,
          reviewer,
          store,
          reply,
          _original: review
        });
      });
      
      return reviews;
    }

    function parseCSV(csvText) {
      const lines = csvText.split('\n');
      const rawHeaders = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
      
      const reviews = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        
        const values = [];
        let current = '';
        let inQuotes = false;
        
        for (const char of lines[i]) {
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            values.push(current.trim().replace(/^"|"$/g, ''));
            current = '';
          } else {
            current += char;
          }
        }
        values.push(current.trim().replace(/^"|"$/g, ''));
        
        const rawReview = {};
        rawHeaders.forEach((header, index) => {
          rawReview[header] = values[index] || '';
        });
        
        // Normalize to standard format (support Phantom CSV format)
        const review = {
          date: rawReview['review date'] || rawReview['date'] || rawReview['data'] || '',
          rating: parseFloat(rawReview['star rating'] || rawReview['rating'] || rawReview['stelle'] || '0'),
          text: rawReview['review content'] || rawReview['text'] || rawReview['review'] || rawReview['comment'] || '',
          reviewer: rawReview['author name'] || rawReview['reviewer'] || rawReview['name'] || rawReview['autore'] || 'Anonimo',
          store: ''
        };
        
        reviews.push(review);
      }
      
      return reviews;
    }

    function StatCard({ title, value, subtitle, icon, trend, color }) {
      return (
        <div className="stat-card" style={{ '--accent': color }}>
          <div className="stat-header">
            <Icon name={icon} size={20} />
            <span>{title}</span>
          </div>
          <div className="stat-value">{value}</div>
          {subtitle && (
            <div className="stat-subtitle">
              {trend === 'up' && <Icon name="trendingUp" size={14} />}
              {trend === 'down' && <Icon name="trendingDown" size={14} />}
              {subtitle}
            </div>
          )}
        </div>
      );
    }

    function WinnerCard({ winner, prize, month, noWinnerMessage }) {
      // Non mostrare nulla se non c'è vincitore
      if (noWinnerMessage || !winner || !prize) return null;
      
      return (
        <div className="winner-card">
          <div className="winner-header">
            <span className="winner-trophy">🏆</span>
            <div className="winner-title">
              <h3>Vincitore {month}</h3>
              <p>Classifica Cassieri</p>
            </div>
          </div>
          <div className="winner-content">
            <div className="winner-name">{winner.name}</div>
            {!winner.isManual && (
              <div className="winner-stats">
                {winner.mentions} menzioni • {winner.positiveCount} positive • ⭐ {winner.avgRating}
              </div>
            )}
          </div>
          <div className="winner-prize">
            <span className="prize-emoji">{prize.emoji}</span>
            <div className="prize-info">
              <span className="prize-label">Premio del mese</span>
              <span className="prize-name">{prize.name}</span>

    function StoreRanking({ stores, reviews }) {
      const [sortBy, setSortBy] = useState('rating'); // 'rating' or 'count'
      
      const storeStats = useMemo(() => {
        return STORES.map(store => {
          const storeReviews = reviews.filter(r => 
            r.store?.toLowerCase() === store.id || 
            r.store?.toLowerCase().includes(store.name.toLowerCase())
          );
          
          const totalRating = storeReviews.reduce((sum, r) => sum + (parseFloat(r.rating) || 0), 0);
          const avgRating = storeReviews.length > 0 ? totalRating / storeReviews.length : 0;
          const positiveCount = storeReviews.filter(r => analyzeSentiment(r.text || '', r.rating) === 'positive').length;
          
          return {
            ...store,
            reviewCount: storeReviews.length,
            avgRating: avgRating.toFixed(2),
            positivePercent: storeReviews.length > 0 ? Math.round((positiveCount / storeReviews.length) * 100) : 0
          };
        });
      }, [reviews]);

      const sortedStats = useMemo(() => {
        return [...storeStats].sort((a, b) => {
          if (sortBy === 'rating') {
            return parseFloat(b.avgRating) - parseFloat(a.avgRating);
          } else {
            return b.reviewCount - a.reviewCount;
          }
        });
      }, [storeStats, sortBy]);

      const maxReviews = Math.max(...storeStats.map(s => s.reviewCount), 1);

      return (
        <div className="ranking-section">

            <Icon name="store" size={24} />

              className={`sort-btn ${sortBy === 'count' ? 'active' : ''}`}
              onClick={() => setSortBy('count')}
            >
              📊 Per N° Recensioni
            </button>
          </div>

                    className="ranking-bar-fill" 
                    style={{ 
                      width: sortBy === 'rating' 
                        ? `${(parseFloat(store.avgRating) / 5) * 100}%`
                        : `${(store.reviewCount / maxReviews) * 100}%`
                    }} 
                  />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function CashierRanking({ reviews, cashiers, isAdmin }) {
      const [expandedCashier, setExpandedCashier] = useState(null);
      const MIN_MENTIONS = 50;
      
      const cashierStats = useMemo(() => {
        return cashiers.map(name => {
          const mentions = [];
          
          reviews.forEach(review => {
            const text = review.text || '';
            if (text.toLowerCase().includes(name.toLowerCase())) {
              mentions.push({
                text,
                rating: parseFloat(review.rating) || 0,
                sentiment: analyzeSentiment(text, parseFloat(review.rating) || 0),
                date: review.date || '',
                store: review.store || ''
              });
            }
          });
          
          const positiveCount = mentions.filter(m => m.sentiment === 'positive').length;
          const negativeCount = mentions.filter(m => m.sentiment === 'negative').length;
          const totalRating = mentions.reduce((sum, m) => sum + m.rating, 0);
          const avgRating = mentions.length > 0 ? totalRating / mentions.length : 0;
          
          const score = mentions.length > 0 
            ? (avgRating * 20) + (positiveCount * 5) - (negativeCount * 10) + (mentions.length * 2)
            : 0;
          
          const progressToWin = Math.min(100, (mentions.length / MIN_MENTIONS) * 100);
          const canWin = mentions.length >= MIN_MENTIONS;
          
          return {
            name,
            mentions: mentions.length,
            positiveCount,
            negativeCount,
            avgRating: avgRating.toFixed(2),
            score: Math.max(0, score).toFixed(0),
            recentMentions: mentions.slice(0, 3),
            progressToWin,
            canWin
          };
        })
        .filter(c => c.mentions > 0)
        .sort((a, b) => parseFloat(b.score) - parseFloat(a.score));
      }, [reviews, cashiers]);

      return (
        <div className="ranking-section">
          <h2 className="section-title">
            <Icon name="users" size={24} />
            Classifica Cassieri
          </h2>
          {!isAdmin && (
            <div className="rules-info">

          {cashierStats.length === 0 ? (
            <div className="empty-state">
              <Icon name="alertCircle" size={32} />
              <p>Nessun cassiere menzionato nelle recensioni</p>
            </div>
          ) : (
            <div className="cashier-list">
              {cashierStats.map((cashier, index) => (
                <div key={cashier.name} className={`cashier-card ${cashier.canWin ? 'can-win' : ''}`}>
                  <div className="cashier-header" onClick={() => setExpandedCashier(expandedCashier === cashier.name ? null : cashier.name)}>
                    <div className="cashier-rank">
                      {index === 0 ? '🏆' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}
                    </div>
                    <div className="cashier-info">
                      <div className="cashier-name">
                        {cashier.name}
                        {cashier.canWin && <span className="can-win-badge">✓ Idoneo</span>}
                      </div>
                      <div className="cashier-metrics">
                        <span className="metric positive">
                          <Icon name="trendingUp" size={12} /> {cashier.positiveCount}
                        </span>
                        <span className="metric negative">
                          <Icon name="trendingDown" size={12} /> {cashier.negativeCount}
                        </span>
                        <span className="metric rating">
                          <Icon name="star" size={12} fill="#FFD700" stroke="#FFD700" /> {cashier.avgRating}
                        </span>
                      </div>
                      {!cashier.canWin && (
                        <div className="progress-bar-container">
                          <div className="progress-bar" style={{ width: `${cashier.progressToWin}%` }}></div>
                          <span className="progress-text">{cashier.mentions}/50</span>
                        </div>
                      )}
                    </div>
                    <div className="cashier-score">
                      <div className="score-value">{index + 1}°</div>
                      <div className="score-label">posizione</div>
                    </div>
                    <div className="cashier-mentions">{cashier.mentions} menzioni</div>

    function App() {
      const [userRole, setUserRole] = useState(null); // null, 'admin', 'employee'
      
      // State
      const [reviews, setReviews] = useState([]);
      const [cashiers, setCashiers] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [isDragging, setIsDragging] = useState(false);
      const [uploadedFiles, setUploadedFiles] = useState([]);
      const [selectedMonth, setSelectedMonth] = useState(null);
      
      // Mese, premio e vincitore impostati da Admin per User
      const [userMonth, setUserMonth] = useState(null);
      const [userPrize, setUserPrize] = useState(null);
      const [userWinner, setUserWinner] = useState(null);
      
      // Backup recensioni per funzione "Annulla"
      const [reviewsBackup, setReviewsBackup] = useState(null);
      
      // Indicatore salvataggio
      const [saveStatus, setSaveStatus] = useState(null); // null, 'saving', 'saved', 'error'
      
      const showSaveIndicator = (status) => {
        setSaveStatus(status);
        if (status === 'saved') {
          setTimeout(() => setSaveStatus(null), 2000);
        }
      };

      // Load data from Supabase on mount
      React.useEffect(() => {
        loadFromSupabase();
      }, []);

      const loadFromSupabase = async () => {
        setIsLoading(true);
        try {
          // Load ALL reviews con paginazione (Supabase ha limite 1000 per query)
          let allReviews = [];
          let page = 0;
          const pageSize = 1000;
          let hasMore = true;
          
          while (hasMore) {
            const { data: reviewsData, error: reviewsError } = await supabaseClient
              .from('reviews_dashboard')
              .select('*')
              .range(page * pageSize, (page + 1) * pageSize - 1);
            
            if (reviewsError) {
              console.error('Error loading reviews:', reviewsError);
              break;
            }
            
            if (reviewsData && reviewsData.length > 0) {
              allReviews = [...allReviews, ...reviewsData];
              page++;
              if (reviewsData.length < pageSize) {
                hasMore = false;
              }
            } else {
              hasMore = false;
            }
          }
          
          setReviews(allReviews);
          console.log('Loaded reviews:', allReviews.length);

          // Load cashiers
          const { data: cashiersData } = await supabaseClient
            .from('cashiers_dashboard')
            .select('*');
          if (cashiersData && cashiersData.length > 0) {
            setCashiers(cashiersData.map(c => c.name));
          }

          // Load settings
          const { data: settingsData } = await supabaseClient
            .from('settings_dashboard')
            .select('*');
          if (settingsData) {
            const monthSetting = settingsData.find(s => s.key === 'user_month');
            const prizeSetting = settingsData.find(s => s.key === 'user_prize');
            const winnerSetting = settingsData.find(s => s.key === 'user_winner');
            if (monthSetting?.value) setUserMonth(monthSetting.value);
            if (prizeSetting?.value) {
              try { setUserPrize(JSON.parse(prizeSetting.value)); } catch(e) {}
            }
            if (winnerSetting?.value) {
              try { setUserWinner(JSON.parse(winnerSetting.value)); } catch(e) {}
            }
          }
        } catch (error) {
          console.error('Error loading from Supabase:', error);
        }
        setIsLoading(false);
      };

      // Save setting to Supabase
      const saveSettingToSupabase = async (key, value) => {
        showSaveIndicator('saving');
        try {
          const { error } = await supabaseClient
            .from('settings_dashboard')
            .upsert({ key, value: typeof value === 'string' ? value : JSON.stringify(value) });
          if (error) {
            console.error('Error saving setting:', error);
            showSaveIndicator('error');
          } else {
            showSaveIndicator('saved');
          }
        } catch (err) {
          console.error('Error:', err);
          showSaveIndicator('error');
        }
      };

      // Save reviews to Supabase (con controllo duplicati)
      const saveReviewsToSupabase = async (newReviews) => {
        showSaveIndicator('saving');
        try {
          // Carica recensioni esistenti per controllo duplicati
          const { data: existingReviews } = await supabaseClient
            .from('reviews_dashboard')
            .select('text, date, reviewer');
          
          // Crea un Set di chiavi uniche per le recensioni esistenti
          const existingKeys = new Set();
          if (existingReviews) {
            existingReviews.forEach(r => {
              const key = `${r.text || ''}_${r.date || ''}_${r.reviewer || ''}`;
              existingKeys.add(key);
            });
          }
          
          // Filtra solo le recensioni nuove (non duplicate)
          const uniqueReviews = newReviews.filter(r => {
            const key = `${r.text || ''}_${r.date || ''}_${r.reviewer || ''}`;
            return !existingKeys.has(key);
          });
          
          const duplicateCount = newReviews.length - uniqueReviews.length;
          
          if (uniqueReviews.length === 0) {
            showSaveIndicator('duplicate');
            return { saved: 0, duplicates: duplicateCount };
          }
          
          const { error } = await supabaseClient
            .from('reviews_dashboard')
            .insert(uniqueReviews.map(r => ({
              store: r.store || '',
              rating: r.rating || 0,
              text: r.text || '',
              reviewer: r.reviewer || '',
              date: r.date || ''
            })));
          if (error) {
            console.error('Error saving reviews:', error);
            showSaveIndicator('error');
            return { saved: 0, duplicates: duplicateCount, error: true };
          } else {
            showSaveIndicator('saved');
            return { saved: uniqueReviews.length, duplicates: duplicateCount };
          }
        } catch (err) {
          console.error('Error:', err);
          showSaveIndicator('error');
          return { saved: 0, duplicates: 0, error: true };
        }
      };

      // Save cashier to Supabase
      const saveCashierToSupabase = async (name) => {
        showSaveIndicator('saving');
        try {
          const { error } = await supabaseClient
            .from('cashiers_dashboard')
            .insert({ name });
          if (error) {
            console.error('Error saving cashier:', error);
            showSaveIndicator('error');
          } else {
            showSaveIndicator('saved');
          }
        } catch (err) {
          console.error('Error:', err);
          showSaveIndicator('error');
        }
      };

      // Delete cashier from Supabase
      const deleteCashierFromSupabase = async (name) => {
        showSaveIndicator('saving');
        try {
          const { error } = await supabaseClient
            .from('cashiers_dashboard')
            .delete()
            .eq('name', name);
          if (error) {
            console.error('Error deleting cashier:', error);
            showSaveIndicator('error');
          } else {
            showSaveIndicator('saved');
          }
        } catch (err) {
          console.error('Error:', err);
          showSaveIndicator('error');
        }
      };

      // Clear all reviews from Supabase
      const clearReviewsFromSupabase = async () => {
        try {
          const { error } = await supabaseClient
            .from('reviews_dashboard')
            .delete()
            .neq('id', 0);
          if (error) console.error('Error clearing reviews:', error);
        } catch (err) {
          console.error('Error:', err);
        }
      };

      // Restore reviews from backup
      const restoreReviewsFromBackup = async () => {
        if (reviewsBackup && reviewsBackup.length > 0) {
          setReviews(reviewsBackup);
          await saveReviewsToSupabase(reviewsBackup);
          setReviewsBackup(null);
          alert('Recensioni ripristinate!');
        } else {
          alert('Nessun backup disponibile');
        }
      };

      // Calcola i mesi disponibili dalle recensioni
      const availableMonths = useMemo(() => {
        const months = new Set();
        reviews.forEach(r => {
          const dateStr = r.date || '';
          const date = parseReviewDate(dateStr);
          const monthKey = getMonthKey(date);
          if (monthKey) months.add(monthKey);
        });
        return Array.from(months).sort().reverse();
      }, [reviews]);

      // Per User: usa il mese impostato da Admin
      React.useEffect(() => {
        if (userRole === 'employee' && userMonth) {
          setSelectedMonth(userMonth);
        }
      }, [userRole, userMonth]);

      // Save reviews to localStorage whenever they change
      React.useEffect(() => {
        localStorage.setItem('donts_reviews', JSON.stringify(reviews));
      }, [reviews]);

      // Save cashiers to localStorage whenever they change
      React.useEffect(() => {
        localStorage.setItem('donts_cashiers', JSON.stringify(cashiers));
      }, [cashiers]);

      // Save uploaded files info to localStorage
      React.useEffect(() => {
        localStorage.setItem('donts_uploaded_files', JSON.stringify(uploadedFiles));
      }, [uploadedFiles]);

      const filteredReviews = useMemo(() => {
        if (!selectedMonth) return reviews;
        return reviews.filter(r => {
          const dateStr = r.date || '';
          const date = parseReviewDate(dateStr);
          return getMonthKey(date) === selectedMonth;
        });
      }, [reviews, selectedMonth]);

      const handleFile = (file, storeName) => {
        const reader = new FileReader();
        const fileType = file.name.endsWith('.json') ? 'json' : 'csv';
        
        // Auto-detect store from filename (Phantom CSV or folder name)
        let detectedStore = storeName;
        if (!detectedStore) {
          const fileName = file.name.toLowerCase();
          // Check for store names
          if (fileName.includes('trastevere')) detectedStore = 'trastevere';
          else if (fileName.includes('istria')) detectedStore = 'istria';
          else if (fileName.includes('ponte') || fileName.includes('milvio')) detectedStore = 'ponte';
          else if (fileName.includes('tuscolana')) detectedStore = 'tuscolana';
          // Check for Google Takeout location IDs
          else detectedStore = detectStoreFromLocationId(fileName);
        }
        
        reader.onload = (e) => {
          let parsed = [];
          
          if (fileType === 'json') {
            try {
              const jsonData = JSON.parse(e.target.result);
              parsed = parseGoogleTakeoutJSON(jsonData, file.name);
            } catch (err) {
              console.error('Errore parsing JSON:', err);
              alert('Errore nel parsing del file JSON.');
              return;
            }
          } else {
            parsed = parseCSV(e.target.result);
          }
          
          // Apply detected store to all reviews, or use store from each review
          const reviewsWithStore = parsed.map(r => ({ 
            ...r, 
            store: detectedStore || r.store || 'unknown' 
          }));
          
          // Find store name for display
          const storeObj = STORES.find(s => s.id === detectedStore);
          const storeLabelForDisplay = storeObj ? storeObj.name : (detectedStore || 'Non riconosciuto');
          
          // Filtra duplicati localmente (confronta con recensioni già caricate)
          setReviews(prev => {
            const existingKeys = new Set();
            prev.forEach(r => {
              const key = `${r.text || ''}_${r.date || ''}_${r.reviewer || ''}`;
              existingKeys.add(key);
            });
            
            const uniqueNewReviews = reviewsWithStore.filter(r => {
              const key = `${r.text || ''}_${r.date || ''}_${r.reviewer || ''}`;
              return !existingKeys.has(key);
            });
            
            return [...prev, ...uniqueNewReviews];
          });
          
          // Salva su Supabase (controlla duplicati anche lì)
          saveReviewsToSupabase(reviewsWithStore);
          
          setUploadedFiles(prev => [...prev, { 
            name: file.name, 
            store: detectedStore,
            storeLabel: storeLabelForDisplay,
            count: parsed.length,
            type: fileType 
          }]);
        };
        
        reader.readAsText(file);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        const files = Array.from(e.dataTransfer.files);
        files.forEach(file => {
          if (file.name.endsWith('.csv') || file.name.endsWith('.json')) {
            handleFile(file, null);
          }
        });
      };

      const handleFileInput = (e, storeId) => {
        const file = e.target.files[0];
        if (file) {
          handleFile(file, storeId);
        }
      };

      const clearAllData = async () => {
        // Salva backup prima di cancellare
        if (reviews.length > 0) {
          setReviewsBackup([...reviews]);
        }
        setReviews([]);
        setUploadedFiles([]);
        setSelectedMonth(null);
        await clearReviewsFromSupabase();
      };

      const stats = useMemo(() => {
        const totalReviews = filteredReviews.length;
        const avgRating = totalReviews > 0 
          ? (filteredReviews.reduce((sum, r) => sum + (parseFloat(r.rating) || 0), 0) / totalReviews).toFixed(2)
          : '0.00';
        const positiveCount = filteredReviews.filter(r => analyzeSentiment(r.text || '', r.rating) === 'positive').length;
        const negativeCount = filteredReviews.filter(r => analyzeSentiment(r.text || '', r.rating) === 'negative').length;
        
        return { totalReviews, avgRating, positiveCount, negativeCount };
      }, [filteredReviews]);

      // Calcola vincitore del mese (cassiere con più menzioni positive)
      // REQUISITO: minimo 50 menzioni per vincere
      const MIN_MENTIONS_TO_WIN = 50;
      
      const monthlyWinner = useMemo(() => {
        if (!selectedMonth) return null;
        
        const cashierStats = cashiers.map(name => {
          const mentions = [];
          filteredReviews.forEach(review => {
            const text = review.text || '';
            if (text.toLowerCase().includes(name.toLowerCase())) {
              mentions.push({
                rating: parseFloat(review.rating) || 0,
                sentiment: analyzeSentiment(text, parseFloat(review.rating) || 0)
              });
            }
          });
          
          const positiveCount = mentions.filter(m => m.sentiment === 'positive').length;
          const totalRating = mentions.reduce((sum, m) => sum + m.rating, 0);
          const avgRating = mentions.length > 0 ? totalRating / mentions.length : 0;
          const score = mentions.length > 0 
            ? (avgRating * 20) + (positiveCount * 5) + (mentions.length * 2)
            : 0;
          
          return { name, mentions: mentions.length, positiveCount, avgRating: avgRating.toFixed(2), score };
        }).filter(c => c.mentions >= MIN_MENTIONS_TO_WIN).sort((a, b) => b.score - a.score);
        
        return cashierStats.length > 0 ? cashierStats[0] : null;
      }, [filteredReviews, cashiers, selectedMonth]);

      const currentPrize = useMemo(() => {
        return selectedMonth ? getPrizeForMonth(selectedMonth) : null;
      }, [selectedMonth]);

      const handleLogout = () => {
        setUserRole(null);
      };

      // Show login screen if not authenticated
      if (!userRole) {
        return <LoginScreen onLogin={setUserRole} />;
      }

      const isAdmin = userRole === 'admin';

      return (
        <div className="dashboard">
          <header className="header">
            <h1 className="logo">DONTS Reviews</h1>
            <p className="subtitle">Dashboard Recensioni Google • Classifica Store & Cassieri</p>
            <div className="user-info">
              {saveStatus && (
                <span className={`save-indicator ${saveStatus}`}>
                  {saveStatus === 'saving' && '⏳ Salvataggio...'}
                  {saveStatus === 'saved' && '✅ Salvato'}
                  {saveStatus === 'error' && '❌ Errore'}
                  {saveStatus === 'duplicate' && '⚠️ Già importate'}
                </span>
              )}
              <span className="user-role">{isAdmin ? '👑 Admin' : '👤 User'}</span>
              <button className="logout-btn" onClick={handleLogout}>Esci</button>
            </div>
          </header>
          
          {isAdmin && (
            <div 
              className={`upload-zone ${isDragging ? 'dragging' : ''}`}
              onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
              onDragLeave={() => setIsDragging(false)}
              onDrop={handleDrop}
            >
              <div style={{color: '#FF6B35', marginBottom: '1rem'}}>
                <Icon name="upload" size={48} />
              </div>
              <div className="upload-title">Importa Recensioni da Google Takeout</div>
              <div className="upload-subtitle">
                Trascina qui il file <strong>Reviews.json</strong> dalla cartella Google Takeout, oppure seleziona per store:
              </div>
              
              <div className="upload-instructions">
                <div className="instruction-step">1. Vai su <a href="https://takeout.google.com" target="_blank" rel="noopener noreferrer">takeout.google.com</a></div>
                <div className="instruction-step">2. Seleziona solo "Google Business Profile"</div>
                <div className="instruction-step">3. Scarica e estrai lo ZIP</div>
                <div className="instruction-step">4. Trova <code>Reviews.json</code> nella cartella</div>
              </div>
              
              <div className="store-uploads">
                {STORES.map(store => (
                  <label key={store.id} className="store-upload" style={{ '--store-color': store.color }}>
                    <input 
                      type="file" 
                      accept=".csv,.json" 
                      onChange={(e) => handleFileInput(e, store.id)} 
                    />
                    <div className="store-name" style={{ color: store.color }}>{store.name}</div>
                    <div className="store-hint">Carica JSON/CSV</div>
                  </label>
                ))}
              </div>
              
              <div className="general-upload">
                <label className="upload-button">
                  <input 
                    type="file" 
                    accept=".csv,.json" 
                    onChange={(e) => handleFileInput(e, null)} 
                  />
                  <Icon name="upload" size={16} />
                  Carica file unico (tutti gli store)
                </label>
              </div>
              
              {uploadedFiles.length > 0 && (
                <div className="uploaded-files">
                  <span className="uploaded-summary">
                    ✅ {uploadedFiles.length} file caricati • {uploadedFiles.reduce((sum, f) => sum + f.count, 0)} recensioni totali
                  </span>
                  <button className="clear-data" onClick={clearAllData}>
                    ✕ Cancella tutto
                  </button>
                </div>
              )}
              
              {reviewsBackup && reviewsBackup.length > 0 && (
                <div className="restore-backup">
                  <button className="restore-btn" onClick={restoreReviewsFromBackup}>
                    ↩️ Annulla cancellazione ({reviewsBackup.length} recensioni)
                  </button>
                </div>
              )}
            </div>
          )}
          
          {isAdmin && (
            <div className="stats-grid">
              <StatCard 
                title="Totale Recensioni" 
                value={stats.totalReviews}
                icon="award"
                color="#FF6B35"
              />
              <StatCard 
                title="Rating Medio" 
                value={stats.avgRating}
                subtitle="su 5.00"
                icon="star"
                color="#FFD700"
              />
              <StatCard 
                title="Recensioni Positive" 
                value={stats.positiveCount}
                subtitle={stats.totalReviews > 0 ? `${Math.round((stats.positiveCount/stats.totalReviews)*100)}% del totale` : ''}
                icon="trendingUp"
                trend="up"
                color="#4ade80"
              />
              <StatCard 
                title="Recensioni Negative" 
                value={stats.negativeCount}
                subtitle={stats.totalReviews > 0 ? `${Math.round((stats.negativeCount/stats.totalReviews)*100)}% del totale` : ''}
                icon="trendingDown"
                trend="down"
                color="#f87171"
              />
            </div>
          )}
          
          {isAdmin && availableMonths.length > 0 && (
            <MonthSelector 
              availableMonths={availableMonths}
              selectedMonth={selectedMonth}
              setSelectedMonth={setSelectedMonth}
            />
          )}
          
          {isAdmin && (
            <AdminControls
              selectedMonth={selectedMonth}
              userMonth={userMonth}
              setUserMonth={setUserMonth}
              userPrize={userPrize}
              setUserPrize={setUserPrize}
              userWinner={userWinner}
              setUserWinner={setUserWinner}
              formatMonthLabel={formatMonthLabel}
              saveSettingToSupabase={saveSettingToSupabase}
            />
          )}
          
          {!isAdmin && selectedMonth && (
            <CurrentMonthDisplay 
              month={formatMonthLabel(selectedMonth)}
              prize={userPrize}
            />
          )}
          
          {selectedMonth && isAdmin && (
            <WinnerCard 
              winner={userWinner || monthlyWinner}
              prize={userPrize}
              month={formatMonthLabel(selectedMonth)}
              noWinnerMessage={!userWinner && !monthlyWinner}
            />
          )}
          
          {selectedMonth && !isAdmin && userWinner && userPrize && (
            <WinnerCard 
              winner={userWinner}
              prize={userPrize}
              month={formatMonthLabel(selectedMonth)}
              noWinnerMessage={false}
            />
          )}
          
          {isAdmin && (
            <CashierManager 
              cashiers={cashiers} 
              setCashiers={setCashiers}
              saveCashierToSupabase={saveCashierToSupabase}
              deleteCashierFromSupabase={deleteCashierFromSupabase}
            />
          )}
          
          <div className="rankings-container">
            <StoreRanking stores={STORES} reviews={filteredReviews} />
            <CashierRanking reviews={filteredReviews} cashiers={cashiers} isAdmin={isAdmin} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
